services:
  training-api:
    build:
      context: ./server
    command: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    env_file:
      - ./server/.env.example
    environment:
      DATABASE_URL: postgresql://discflight:discflight@postgres:5432/discflight
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: disc-flight-school
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - training-data:/app/dataset
      - training-models:/app/models
      - training-exports:/app/exports

  training-worker:
    build:
      context: ./server
    command: python -m training_server.worker
    env_file:
      - ./server/.env.example
    environment:
      DATABASE_URL: postgresql://discflight:discflight@postgres:5432/discflight
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: disc-flight-school
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - training-data:/app/dataset
      - training-models:/app/models
      - training-exports:/app/exports

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discflight
      POSTGRES_USER: discflight
      POSTGRES_PASSWORD: discflight
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discflight -d discflight"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/disc-flight-school
      "

volumes:
  postgres-data:
  minio-data:
  training-data:
  training-models:
  training-exports:
