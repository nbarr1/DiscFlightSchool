name: Flutter Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test-flutter:
    name: Flutter analyze and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: disc_golf_app
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: disc_golf_app
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: disc_golf_app
        run: flutter test
