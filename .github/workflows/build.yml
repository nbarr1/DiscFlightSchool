name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # Install the exact NDK and SDK versions required by the plugins.
      # NDK 27.0.12077973 — required by tflite_flutter, mlkit, ffmpeg_kit, etc.
      # compileSdk 36 — required by tflite_flutter.
      - name: Install Android NDK and SDK platform
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # Apply init.gradle to suppress -Werror on JavaCompile tasks (ffmpeg_kit, etc.)
      # Gradle only auto-loads init scripts from GRADLE_USER_HOME/init.d/ — the file
      # sitting in android/ is ignored without this step.
      - name: Apply Gradle init script
        run: |
          mkdir -p ~/.gradle/init.d
          cp disc_golf_app/android/init.gradle ~/.gradle/init.d/suppress-werror.gradle

      - name: Install Flutter dependencies
        working-directory: disc_golf_app
        run: flutter pub get

      - name: Check required assets
        working-directory: disc_golf_app
        run: |
          for asset in \
            "assets/data/output_coordinates.json" \
            "assets/data/analysis_results.json" \
            "assets/data/pro_baseline_db.json" \
            "assets/data/knowledge_base.json" \
            "assets/models/disc_detector.tflite" \
            "assets/images/disc_golf_basket.svg"; do
            if [ ! -f "$asset" ]; then
              echo "ERROR: Missing asset: $asset"
              exit 1
            fi
          done
          echo "All assets present."

      - name: Build release APK
        working-directory: disc_golf_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: disc-flight-school-${{ github.run_number }}
          path: disc_golf_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
